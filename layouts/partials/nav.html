<header class="site-header">

      <a href="/" class="site-name"><span class="nav-square"></span>Dario Toman</a>
    </div>
    <button class="nav-toggle" aria-label="Toggle navigation">
      <span></span><span></span><span></span>

      <a href="{{ .URL }}" class="nav-link{{ if eq $.RelPermalink .URL }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </div>
  </nav>
  <div class="nav-rule"></div>
</header>
